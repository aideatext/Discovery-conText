name: Build and Deploy – AIdeaText Discovery conText

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: aideatext-discovery-context

jobs:
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build production bundle
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aideatext/${{ env.IMAGE_NAME }}:latest
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aideatext/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-cloud-run:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: aideatext-discovery-context
          region: us-central1
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aideatext/${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            APP_URL=${{ secrets.APP_URL }}
          flags: '--allow-unauthenticated --port=3000 --memory=512Mi'

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
